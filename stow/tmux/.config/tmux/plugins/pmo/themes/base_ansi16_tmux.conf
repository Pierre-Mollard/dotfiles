# vim:set ft=tmux:

# --> ANSI 16
set -gq @thm_bg "default"
set -gq @thm_fg "default"

# Base ANSI colors
set -gq @thm_red "red"
set -gq @thm_mauve "magenta"
set -gq @thm_green "green"
set -gq @thm_blue "blue"
set -gq @thm_peach "yellow"
set -gq @thm_teal "cyan"
set -gq @thm_sapphire "cyan"
set -gq @thm_yellow "yellow"
set -gq @thm_sky "cyan"
set -gq @thm_lavender "magenta"
set -gq @thm_maroon "red"
set -gq @thm_byellow "yellow"

# Bright / neutral-ish mappings
set -gq @thm_rosewater "white"
set -gq @thm_flamingo "white"
set -gq @thm_pink "brightmagenta"

# Muted text / UI
set -gq @thm_subtext_1 "white"
set -gq @thm_subtext_0 "colour8"
set -gq @thm_overlay_2 "colour8"
set -gq @thm_overlay_1 "colour8"
set -gq @thm_overlay_0 "colour8"
set -gq @thm_surface_2 "colour8"
set -gq @thm_surface_1 "colour8"
set -gq @thm_surface_0 "default"
set -gq @thm_mantle "default"
set -gq @thm_crust "default"

# Custom aliases
set -gq @thm_mcyan "brightcyan"
set -gq @thm_mgreen "brightgreen"
set -gq @myclr_bg "black"

# PMO Plugin Semantics
set -gF @pmo_accent_primary "#{@thm_yellow}"
set -gF @pmo_accent_secondary "#{@thm_mcyan}"
set -gF @pmo_bg_panel "#{@thm_surface_0}"
set -gF @pmo_separator "#{@thm_overlay_0}"
set -gF @pmo_border_inactive "#{@thm_surface_1}"

set -gF @pmo_color_session "#{@thm_red}"
set -gF @pmo_color_process "#{@thm_green}"
set -gF @pmo_color_path "#{@thm_teal}"
set -gF @pmo_color_host "#{@thm_mauve}"
set -gF @pmo_color_time "#{@thm_blue}"
set -gF @pmo_color_zoom "#{@thm_yellow}"
set -gF @pmo_color_mouse "#{@thm_yellow}"
