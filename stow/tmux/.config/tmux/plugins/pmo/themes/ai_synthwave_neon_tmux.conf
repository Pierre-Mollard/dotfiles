# vim:set ft=tmux:

# --> Synthwave Neon
set -gq @thm_bg "#0d0221"
set -gq @thm_fg "#0ff0fc"

# Colors
set -gq @thm_red "#ff0055"
set -gq @thm_mauve "#b800ff"
set -gq @thm_green "#00ffaa"
set -gq @thm_blue "#0088ff"
set -gq @thm_peach "#ff6600"
set -gq @thm_teal "#00f3ff"
set -gq @thm_sapphire "#0055ff"
set -gq @thm_yellow "#fdf500"
set -gq @thm_sky "#0ff0fc"
set -gq @thm_lavender "#d966ff"
set -gq @thm_maroon "#ff0033"
set -gq @thm_byellow "#ffee00"

set -gq @thm_rosewater "#ff7733"
set -gq @thm_flamingo "#ff00aa"
set -gq @thm_pink "#ff00cc"

# Surfaces and overlays
set -gq @thm_subtext_1 "#bce6f0"
set -gq @thm_subtext_0 "#8bc7db"
set -gq @thm_overlay_2 "#4c2885"
set -gq @thm_overlay_1 "#322051"
set -gq @thm_overlay_0 "#261447"
set -gq @thm_surface_2 "#3d1f6b"
set -gq @thm_surface_1 "#2b1452"
set -gq @thm_surface_0 "#1a083d"
set -gq @thm_mantle "#0a011a"
set -gq @thm_crust "#060113"

# PMO Plugin Semantics
set -gF @pmo_accent_primary "#{@thm_pink}"
set -gF @pmo_accent_secondary "#{@thm_sky}"
set -gF @pmo_bg_panel "#{@thm_surface_0}"
set -gF @pmo_separator "#{@thm_surface_0}"
set -gF @pmo_border_inactive "#{@thm_surface_1}"

set -gF @pmo_color_session "#{@thm_red}"
set -gF @pmo_color_process "#{@thm_green}"
set -gF @pmo_color_path "#{@thm_teal}"
set -gF @pmo_color_host "#{@thm_mauve}"
set -gF @pmo_color_time "#{@thm_blue}"
set -gF @pmo_color_zoom "#{@thm_yellow}"
set -gF @pmo_color_mouse "#{@thm_yellow}"
