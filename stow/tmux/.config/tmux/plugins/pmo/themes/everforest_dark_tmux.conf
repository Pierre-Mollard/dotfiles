# vim:set ft=tmux:

# --> Everforest (Dark)
set -gq @thm_bg "#272e33"
set -gq @thm_fg "#d3c6aa"

# Colors
set -gq @thm_red "#e67e80"
set -gq @thm_mauve "#d699b6"
set -gq @thm_green "#a7c080"
set -gq @thm_blue "#7fbbb3"
set -gq @thm_peach "#e69875"
set -gq @thm_teal "#83c092"
set -gq @thm_sapphire "#7fbbb3"
set -gq @thm_yellow "#dbbc7f"
set -gq @thm_sky "#83c092"
set -gq @thm_lavender "#d699b6"
set -gq @thm_maroon "#e67e80"
set -gq @thm_byellow "#dbbc7f"

set -gq @thm_rosewater "#e69875"
set -gq @thm_flamingo "#e69875"
set -gq @thm_pink "#d699b6"

# Surfaces and overlays
set -gq @thm_subtext_1 "#d3c6aa"
set -gq @thm_subtext_0 "#9da9a0"

set -gq @thm_overlay_2 "#859289"
set -gq @thm_overlay_1 "#7a8478"
set -gq @thm_overlay_0 "#56635f"

set -gq @thm_surface_2 "#414b50"
set -gq @thm_surface_1 "#374145"
set -gq @thm_surface_0 "#2f383e"

set -gq @thm_mantle "#232a2e"
set -gq @thm_crust "#1e2326"

# PMO Plugin Semantics
set -gF @pmo_accent_primary "#{@thm_yellow}"
set -gF @pmo_accent_secondary "#{@thm_blue}"
set -gF @pmo_bg_panel "#{@thm_surface_0}"
set -gF @pmo_separator "#{@thm_surface_0}"
set -gF @pmo_border_inactive "#{@thm_surface_1}"

set -gF @pmo_color_session "#{@thm_red}"
set -gF @pmo_color_process "#{@thm_green}"
set -gF @pmo_color_path "#{@thm_teal}"
set -gF @pmo_color_host "#{@thm_mauve}"
set -gF @pmo_color_time "#{@thm_blue}"
set -gF @pmo_color_zoom "#{@thm_peach}"
set -gF @pmo_color_mouse "#{@thm_peach}"
