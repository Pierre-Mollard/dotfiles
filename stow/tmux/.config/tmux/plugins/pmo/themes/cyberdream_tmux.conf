# vim:set ft=tmux:

# --> Cyberdream
set -gq @thm_bg "#16181a"
set -gq @thm_fg "#ffffff"

# Colors
set -gq @thm_red "#ff6e5e"
set -gq @thm_mauve "#bd5eff"
set -gq @thm_green "#5eff6c"
set -gq @thm_blue "#5ea1ff"
set -gq @thm_peach "#ffbd5e"
set -gq @thm_teal "#5ef1ff"
set -gq @thm_sapphire "#5ea1ff"
set -gq @thm_yellow "#f1ff5e"
set -gq @thm_sky "#5ef1ff"
set -gq @thm_lavender "#bd5eff"
set -gq @thm_maroon "#ff6e5e"
set -gq @thm_byellow "#f1ff5e"

set -gq @thm_rosewater "#ffbd5e"
set -gq @thm_flamingo "#ffbd5e"
set -gq @thm_pink "#ff5ea0"

# Surfaces and overlays
set -gq @thm_subtext_1 "#efefef"
set -gq @thm_subtext_0 "#dfdfdf"

set -gq @thm_overlay_2 "#7b8496"
set -gq @thm_overlay_1 "#5c6573"
set -gq @thm_overlay_0 "#3c4048"

set -gq @thm_surface_2 "#242629"
set -gq @thm_surface_1 "#1e2124"
set -gq @thm_surface_0 "#1a1b1e"

set -gq @thm_mantle "#141617"
set -gq @thm_crust "#0b0c0d"

# PMO Plugin Semantics
set -gF @pmo_accent_primary "#{@thm_green}"
set -gF @pmo_accent_secondary "#{@thm_teal}"
set -gF @pmo_bg_panel "#{@thm_surface_0}"
set -gF @pmo_separator "#{@thm_surface_0}"
set -gF @pmo_border_inactive "#{@thm_surface_1}"

set -gF @pmo_color_session "#{@thm_red}"
set -gF @pmo_color_process "#{@thm_green}"
set -gF @pmo_color_path "#{@thm_teal}"
set -gF @pmo_color_host "#{@thm_mauve}"
set -gF @pmo_color_time "#{@thm_blue}"
set -gF @pmo_color_zoom "#{@thm_yellow}"
set -gF @pmo_color_mouse "#{@thm_yellow}"
