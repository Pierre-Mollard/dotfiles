# vim:set ft=tmux:

# --> Dracula
set -gq @thm_bg "#282a36"
set -gq @thm_fg "#f8f8f2"

# Colors
set -gq @thm_red "#ff5555"
set -gq @thm_mauve "#bd93f9"
set -gq @thm_green "#50fa7b"
set -gq @thm_blue "#8be9fd"
set -gq @thm_peach "#ffb86c"
set -gq @thm_teal "#8be9fd"
set -gq @thm_sapphire "#6272a4"
set -gq @thm_yellow "#f1fa8c"
set -gq @thm_sky "#8be9fd"
set -gq @thm_lavender "#ff79c6"
set -gq @thm_maroon "#ff5555"
set -gq @thm_byellow "#f1fa8c"

set -gq @thm_rosewater "#ffb86c"
set -gq @thm_flamingo "#ff79c6"
set -gq @thm_pink "#ff79c6"

# Surfaces and overlays
set -gq @thm_subtext_1 "#f8f8f2"
set -gq @thm_subtext_0 "#e2e2dc"
set -gq @thm_overlay_2 "#6272a4"
set -gq @thm_overlay_1 "#52608a"
set -gq @thm_overlay_0 "#44475a"
set -gq @thm_surface_2 "#6272a4"
set -gq @thm_surface_1 "#52608a"
set -gq @thm_surface_0 "#44475a"
set -gq @thm_mantle "#21222c"
set -gq @thm_crust "#191a21"

# PMO Plugin Semantics
set -gF @pmo_accent_primary "#{@thm_pink}"
set -gF @pmo_accent_secondary "#{@thm_blue}"
set -gF @pmo_bg_panel "#{@thm_surface_0}"
set -gF @pmo_separator "#{@thm_surface_0}"
set -gF @pmo_border_inactive "#{@thm_surface_1}"

set -gF @pmo_color_session "#{@thm_red}"
set -gF @pmo_color_process "#{@thm_green}"
set -gF @pmo_color_path "#{@thm_teal}"
set -gF @pmo_color_host "#{@thm_mauve}"
set -gF @pmo_color_time "#{@thm_sapphire}"
set -gF @pmo_color_zoom "#{@thm_yellow}"
set -gF @pmo_color_mouse "#{@thm_yellow}"
