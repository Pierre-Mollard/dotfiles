# Config
set -gF @pmo_self "#{current_file}"
source -F "#{d:current_file}/themes/#{@flavor}_tmux.conf"

# Save the theme background so we can toggle back to it
set -gF @pmo_saved_thm_bg "#{@thm_bg}"

# 1 = transparent/default, 0 = opaque/theme bg
set -ogq @pmo_alpha_mode "1"

# Runtime background used everywhere that should toggle
if-shell -F '#{==:#{@pmo_alpha_mode},1}' \
  'set -gq @pmo_bg default' \
  'set -gF @pmo_bg "#{@pmo_saved_thm_bg}"'

# Toggle transparent background with PREFIX + a
bind-key a \
  set -gF @pmo_alpha_mode '#{?#{==:#{@pmo_alpha_mode},1},0,1}' \; \
  source-file -F "#{@pmo_self}" \; \
  display-message "Alpha mode toggled"

# Menu styling options
set -ogq @menu_selected_style "fg=#{@thm_fg},bold,bg=#{@thm_overlay_0}"

# Window flags
set -ogq @window_flags_icon_zoom " 󰁌" # Z
set -ogq @window_flags_icon_mark " 󰃀" # M
set -ogq @window_flags_icon_silent " 󰂛" # ~
set -ogq @window_flags_icon_activity " 󱅫" # #
set -ogq @window_flags_icon_bell " 󰂞" # !
set -ogq @window_flags_icon_format "##{?window_activity_flag,#{E:@window_flags_icon_activity},}##{?window_bell_flag,#{E:@window_flags_icon_bell},}##{?window_silence_flag,#{E:@window_flags_icon_silent},}##{?window_marked_flag,#{E:@window_flags_icon_mark},}##{?window_zoomed_flag,#{E:@window_flags_icon_zoom},} "

# popups
%if "#{>=:#{version},3.4}"
  set -gF popup-style "bg=#{@pmo_bg},fg=#{@thm_fg}"
  set -gF popup-border-style "bg=#{@pmo_bg},fg=#{@pmo_accent_primary}"
%endif

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@pmo_accent_primary},fg=#{@pmo_bg_panel},bold]  #S },#{#[bg=#{@pmo_bg},fg=#{@pmo_color_session}]  #S }}"
set -ga status-left "#[bg=#{@pmo_bg},fg=#{@pmo_separator},none]│"
set -ga status-left "#[bg=#{@pmo_bg},fg=#{@pmo_color_process}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@pmo_bg},fg=#{@pmo_separator},none]│"
set -ga status-left "#[bg=#{@pmo_bg},fg=#{@pmo_color_path}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@pmo_bg},fg=#{@pmo_separator},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@pmo_bg},fg=#{@pmo_color_zoom}]#{?window_zoomed_flag,  zoom ,}"

# status right look and feel
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[bg=#{@pmo_bg},fg=#{@pmo_color_host}] 󰇄 #H "
set -ga status-right "#[bg=#{@pmo_bg},fg=#{@pmo_separator},none]│"
set -ga status-right "#[bg=#{@pmo_bg},fg=#{@pmo_color_time}] 󰭦 %d/%m 󰅐 %H:%M "
set -ga status-right "#[bg=#{@pmo_bg},fg=#{@pmo_separator},none]#{?mouse,│,}"
set -ga status-right "#[bg=#{@pmo_bg},fg=#{@pmo_color_mouse}]#{?mouse, 󰍽 ON ,}"

# Configure Tmux
set -g status-position top
set -gF status-style "bg=#{@pmo_bg}"
set -g status-justify "absolute-centre"
set -g status-interval 1

# Pane content look and feel
# Inactive panes are dimmed with a softer foreground color
set -gF window-style "fg=#{@thm_subtext_0},bg=#{@pmo_bg}"
set -gF window-active-style "fg=#{@thm_fg},bg=#{@pmo_bg}"

# pane border look and feel
setw -g pane-border-status top
setw -g pane-border-format ""
# Active border uses Primary/Secondary accents
setw -g pane-active-border-style "bg=#{@pmo_bg},fg=#{?client_prefix,#{@pmo_accent_primary},#{@pmo_accent_secondary}}"
# Inactive border uses the new dedicated variable (blends with bg)
setw -gF pane-border-style "bg=#{@pmo_bg},fg=#{@pmo_border_inactive}"
setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "Window"

# Inactive windows
set -g window-status-format "#{?window_bell_flag,#[bg=#{@pmo_accent_primary}]#[fg=#{@pmo_bg_panel}]#[bold],#{?window_last_flag,#{?client_prefix,#[fg=#{@pmo_accent_primary}],#[fg=#{@pmo_accent_secondary}]},#{?client_prefix,#[fg=#{@thm_surface_1}],#[fg=#{@thm_surface_2}]}}#[bg=#{@pmo_bg}]} #I#{?#{!=:#{window_name},Window},: #W,}#{?window_bell_flag, 󰂚,}#{window_flags_icon_format} "
set -gF window-status-style "bg=#{@pmo_bg},fg=#{@thm_fg}"

# Last selected window
set -gF window-status-last-style "bg=#{@pmo_bg},fg=#{@pmo_accent_secondary}"

# Current window
set -g window-status-current-format "#{?client_prefix,#[bg=#{@pmo_accent_primary}],#[bg=#{@pmo_accent_secondary}]}#[fg=#{@pmo_bg_panel},bold] #I#{?#{!=:#{window_name},Window},: #W,}#{window_flags_icon_format} "
set -gF window-status-current-style "bg=#{@pmo_bg},fg=#{@thm_fg}"

set -gF window-status-activity-style "bg=#{@pmo_accent_primary},fg=#{@pmo_bg_panel}"
set -gF window-status-bell-style "bg=#{@pmo_accent_primary},fg=#{@pmo_bg_panel},bold"

# Separator
set -gF window-status-separator "#{?client_prefix,#[fg=#{@pmo_accent_primary}],#[fg=#{@pmo_separator}]}#[bg=#{@pmo_bg}]│"

# Mode style. This is used for copy mode highlighting to style the current selection.
set -gF mode-style "bg=#{@pmo_accent_primary},fg=#{@thm_crust},bold"
set -gF clock-mode-colour "#{@pmo_accent_secondary}"

# messages
set -gF message-style "fg=#{@pmo_accent_primary},bg=default"
set -gF message-command-style "fg=#{@pmo_accent_secondary},bg=default"

# menu
%if "#{>=:#{version},3.4}"
  set -gF menu-selected-style "#{E:@menu_selected_style}"
%endif
