# Config
source -F "#{d:current_file}/themes/#{@flavor}_tmux.conf"

# Comment these 3 lines to remove transparent background
set -g status-bg default
set -g status-style bg=default
set -g @thm_bg default

# Menu styling options
set -ogq @menu_selected_style "fg=#{@thm_fg},bold,bg=#{@thm_overlay_0}"

# Window flags
set -ogq @window_flags_icon_zoom " 󰁌" # Z
set -ogq @window_flags_icon_mark " 󰃀" # M
set -ogq @window_flags_icon_silent " 󰂛" # ~
set -ogq @window_flags_icon_activity " 󱅫" # #
set -ogq @window_flags_icon_bell " 󰂞" # !
set -ogq @window_flags_icon_format "##{?window_activity_flag,#{E:@window_flags_icon_activity},}##{?window_bell_flag,#{E:@window_flags_icon_bell},}##{?window_silence_flag,#{E:@window_flags_icon_silent},}##{?window_marked_flag,#{E:@window_flags_icon_mark},}##{?window_zoomed_flag,#{E:@window_flags_icon_zoom},} "

# popups
%if "#{>=:#{version},3.4}"
  set -gF popup-style "bg=#{@thm_bg},fg=#{@thm_fg}"
  set -gF popup-border-style "fg=#{@thm_peach}"
%endif

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#[bg=#{@thm_peach}#,fg=#{@myclr_bg}#,bold],#[bg=#{@thm_bg}#,fg=#{@thm_red}]}  #S "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_surface_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_green}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_surface_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_teal}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_surface_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# status right look and feel
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_mauve}] 󰇄 #H "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_surface_0},none]│"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] 󰭦 %d/%m 󰅐 %H:%M "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_surface_0},none]#{?mouse,│,}"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?mouse, 󰍽 ON ,}"

# Configure Tmux
set -g status-position top
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"
set -g status-interval 1

# pane border look and feel
setw -g pane-border-status top
setw -g pane-border-format ""
# Dynamic pane borders: active border turns orange (@thm_peach) on prefix, otherwise cyan
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{?client_prefix,#{@thm_peach},#{@thm_mcyan}}"
# Inactive borders remain static (@thm_surface_0) regardless of prefix state
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "Window"
# Inactive windows
set -g window-status-format "#{?window_bell_flag,#[bg=#{@thm_peach}]#[fg=#{@myclr_bg}]#[bold],#{?window_last_flag,#{?client_prefix,#[fg=#{@thm_peach}],#[fg=#{@thm_mcyan}]},#{?client_prefix,#[fg=#{@thm_surface_1}],#[fg=#{@thm_surface_2}]}}#[bg=#{@thm_bg}]} #I#{?#{!=:#{window_name},Window},: #W,}#{?window_bell_flag, 󰂚,}#{window_flags_icon_format} "
set -g window-status-style "bg=default,fg=default"
# Last selected window
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_mcyan}"
# Current window
set -g window-status-current-format "#{?client_prefix,#[bg=#{@thm_peach}],#[bg=#{@thm_mcyan}]}#[fg=#{@myclr_bg},bold] #I#{?#{!=:#{window_name},Window},: #W,}#{window_flags_icon_format} "
set -g window-status-current-style "bg=default,fg=default"

set -g window-status-activity-style "bg=#{@thm_peach},fg=#{@myclr_bg}"
set -g window-status-bell-style "bg=#{@thm_peach},fg=#{@myclr_bg},bold"

# Separator
set -gF window-status-separator "#{?client_prefix,#[fg=#{@thm_peach}],#[fg=#{@thm_surface_0}]}#[bg=#{@thm_bg}]│"

# Mode style. This is used for copy mode highlighting to style the current selection.
set -gF mode-style "bg=#{@thm_peach},fg=#{@thm_crust},bold"
set -gF clock-mode-colour "#{@thm_mcyan}"

# messages
set -gF message-style "fg=#{@thm_peach},bg=default"
set -gF message-command-style "fg=#{@thm_mcyan},bg=default"

# menu
%if "#{>=:#{version},3.4}"
  set -gF menu-selected-style "#{E:@menu_selected_style}"
%endif
